name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'
  GRADLE_VERSION: '8.5'

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --prefer-offline --no-audit --no-fund
      
      - name: TypeScript Type Check
        run: npx tsc --noEmit --project tsconfig.app.json
        continue-on-error: false
      
      - name: Run Linter
        run: npm run lint
        continue-on-error: false
      
      - name: Run Tests (if available)
        run: |
          if npm run test -- --run 2>/dev/null; then
            echo "Tests passed"
          else
            echo "No tests configured or test command not available"
          fi
        continue-on-error: true

  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --prefer-offline --no-audit --no-fund
      
      - name: Install Capacitor plugins
        run: |
          npm install @capacitor/share@latest
          npm install @capacitor/filesystem@latest
          npm install @capacitor/core@latest
      
      - name: Build React app
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          CI: "true"
        run: npm run build
      
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@latest
      
      - name: Recreate Android platform
        run: |
          echo "Cleaning existing Android platform (if any)..."
          rm -rf android
          echo "Adding fresh Android platform..."
          npx cap add android
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Setup Gradle wrapper
        working-directory: android
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Gradle wrapper not found, generating it..."
            gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}
          fi
          chmod +x gradlew
          ./gradlew --version
      
      - name: Verify Android configuration
        working-directory: android
        run: |
          echo "Verifying Android configuration..."
          # Check if build.gradle exists and has correct package name
          if [ -f "app/build.gradle" ]; then
            if grep -q 'applicationId "com.prakashbhai.billbuddy"' app/build.gradle; then
              echo "✓ Package name is correct"
            else
              echo "⚠ Package name might need adjustment"
            fi
          fi
          
          # Verify MainActivity exists
          if [ -f "app/src/main/java/com/prakashbhai/billbuddy/MainActivity.java" ]; then
            echo "✓ MainActivity found"
          else
            echo "⚠ MainActivity not found at expected location"
          fi
          
          # Verify google-services.json exists
          if [ -f "app/google-services.json" ]; then
            echo "✓ google-services.json found"
          else
            echo "⚠ google-services.json not found"
          fi
      
      - name: Determine build type
        id: build_type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=debug" >> $GITHUB_OUTPUT
          fi
      
      - name: Build Android APK
        working-directory: android
        run: |
          ./gradlew clean
          if [ "${{ steps.build_type.outputs.type }}" == "release" ]; then
            echo "Building release APK..."
            ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace --warning-mode all
          else
            echo "Building debug APK..."
            ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all
          fi
      
      - name: Verify build artifacts
        working-directory: android
        run: |
          if [ "${{ steps.build_type.outputs.type }}" == "release" ]; then
            if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
              echo "✓ Release APK found"
              ls -lh app/build/outputs/apk/release/app-release.apk
            else
              echo "✗ Release APK not found"
              exit 1
            fi
            if [ -f "app/build/outputs/bundle/release/app-release.aab" ]; then
              echo "✓ Release AAB found"
              ls -lh app/build/outputs/bundle/release/app-release.aab
            else
              echo "✗ Release AAB not found"
              exit 1
            fi
          else
            if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
              echo "✓ Debug APK found"
              ls -lh app/build/outputs/apk/debug/app-debug.apk
            else
              echo "✗ Debug APK not found"
              exit 1
            fi
          fi
      
      - name: Upload Debug APK artifact
        if: steps.build_type.outputs.type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
      
      - name: Upload Release APK artifact
        if: steps.build_type.outputs.type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
          if-no-files-found: error
      
      - name: Upload Release AAB artifact
        if: steps.build_type.outputs.type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
          if-no-files-found: error
      
      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Build Type: ${{ steps.build_type.outputs.type }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node Version: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Java Version: ${{ env.JAVA_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Gradle Version: ${{ env.GRADLE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build_type.outputs.type }}" == "debug" ]; then
            echo "- Debug APK: app-debug-apk" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Release APK: app-release-apk" >> $GITHUB_STEP_SUMMARY
            echo "- Release AAB: app-release-aab" >> $GITHUB_STEP_SUMMARY
          fi
